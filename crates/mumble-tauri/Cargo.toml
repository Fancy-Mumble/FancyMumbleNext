[package]
name = "mumble-tauri"
version = "0.1.0"
edition = "2021"
description = "Tauri desktop & mobile GUI for mumble-protocol"
license = "MIT"

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "mumble-tauri"
path = "src/main.rs"

[dependencies]
tauri = { version = "2.10.1", features = [] }
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
rustls = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2"
rcgen = "0.14.7"
tracing = "0.1"
tracing-subscriber = "0.3"

# Desktop-only dependencies (cpal, global shortcuts, and Opus are not available on Android).
[target.'cfg(not(target_os = "android"))'.dependencies]
mumble-protocol = { path = "../mumble-protocol", features = ["opus-codec"] }
cpal = "0.17.3"
tauri-plugin-global-shortcut = "2"

# Android: mumble-protocol without Opus (audio is not supported on Android).
[target.'cfg(target_os = "android")'.dependencies]
mumble-protocol = { path = "../mumble-protocol" }

[lints]
workspace = true

[build-dependencies]
tauri-build = { version = "2", features = [] }

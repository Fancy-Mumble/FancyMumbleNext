[package]
name = "mumble-tauri"
version = "0.1.0"
edition = "2021"
description = "Tauri desktop & mobile GUI for mumble-protocol"
license = "MIT"

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "mumble-tauri"
path = "src/main.rs"

[dependencies]
mumble-protocol = { path = "../mumble-protocol", features = ["opus-codec"] }
tauri = { version = "2", features = [] }
tauri-plugin-store = "2"
tauri-plugin-global-shortcut = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
rustls = { version = "0.23", features = ["ring"] }
rustls-pemfile = "2"
rcgen = "0.13"
tracing = "0.1"
tracing-subscriber = "0.3"
cpal = "0.15"

[lints]
workspace = true

[build-dependencies]
tauri-build = { version = "2", features = [] }

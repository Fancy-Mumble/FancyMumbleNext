name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

jobs:
  # ----------------------------------------------------------------
  # 0. Preflight checks (runs first)
  # ----------------------------------------------------------------

  preflight:
    name: Preflight (Android signing)
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate Android signing keystore secrets
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' }}
        shell: bash
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/android-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null

      - name: Skip signing preflight (missing secrets)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 == '' || env.ANDROID_KEYSTORE_PASSWORD == '' || env.ANDROID_KEY_ALIAS == '' }}
        run: echo "Android signing secrets are missing. Continuing without signing preflight."

  # ----------------------------------------------------------------
  # 1. Lint & test (runs on every push / PR)
  # ----------------------------------------------------------------

  test:
    name: Test (${{ matrix.os }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      # -- Toolchain -----------------------------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}-test

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # -- Linux system deps (Tauri + ALSA for cpal) --------------
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            protobuf-compiler

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      # -- Frontend ------------------------------------------------
      - name: Install npm dependencies
        working-directory: crates/mumble-tauri/ui
        run: npm ci

      - name: TypeScript type-check
        working-directory: crates/mumble-tauri/ui
        run: npx tsc --noEmit

      - name: Frontend unit tests
        working-directory: crates/mumble-tauri/ui
        run: npm test

      # -- Rust ----------------------------------------------------
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust unit tests (mumble-protocol)
        run: cargo test --package mumble-protocol --features opus-codec --lib

      - name: Rust unit tests (fancy-utils)
        run: cargo test --package fancy-utils --lib

      - name: Rust unit tests (mumble-tauri)
        run: cargo test --package mumble-tauri --lib

      # -- Integration tests (Linux only - Docker) ----------------
      - name: Start Mumble test server
        if: runner.os == 'Linux'
        working-directory: crates/mumble-protocol
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Integration tests
        if: runner.os == 'Linux'
        run: cargo test --package mumble-protocol --test integration

      - name: Stop Mumble test server
        if: runner.os == 'Linux' && always()
        working-directory: crates/mumble-protocol
        run: docker compose -f docker-compose.test.yml down

  # ----------------------------------------------------------------
  # 2. Build Tauri app (runs on every push / PR)
  # ----------------------------------------------------------------

  build:
    name: Build (${{ matrix.target.name }})
    needs: test
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Linux
            os: ubuntu-latest
            bundle-ext: "deb,appimage"
          - name: Windows
            os: windows-latest
            bundle-ext: "msi,nsis"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target.os }}-build

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            protobuf-compiler

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Install npm dependencies
        working-directory: crates/mumble-tauri/ui
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: crates/mumble-tauri
        run: cargo tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fancy-mumble-${{ matrix.target.name }}
          path: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
          if-no-files-found: warn

  # ----------------------------------------------------------------
  # 2b. Build Android APK (runs on every push / PR)
  # ----------------------------------------------------------------

  build-android:
    name: Build (Android)
    needs: test
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_PASSWORD_EFFECTIVE: ${{ secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_KEY_PASSWORD || secrets.ANDROID_KEYSTORE_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-latest-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install npm dependencies
        working-directory: crates/mumble-tauri/ui
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Prepare Android signing keystore
        id: android_signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_KEYSTORE_PASSWORD != '' && env.ANDROID_KEY_ALIAS != '' }}
        shell: bash
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/android-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      - name: Validate Android signing keystore
        if: ${{ steps.android_signing.outputs.keystore_path != '' }}
        shell: bash
        run: |
          keytool -list \
            -keystore "${{ steps.android_signing.outputs.keystore_path }}" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null

      - name: Build Android APK
        working-directory: crates/mumble-tauri
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          ANDROID_KEYSTORE_PATH: ${{ steps.android_signing.outputs.keystore_path }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD_EFFECTIVE }}
        run: cargo tauri android build --apk

      - name: Verify Android .so (no unresolved C++ symbols)
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          chmod +x scripts/check-android-so.sh
          ./scripts/check-android-so.sh

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fancy-mumble-Android
          path: |
            crates/mumble-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

  # ----------------------------------------------------------------
  # 3. Release (only on push to main)
  # ----------------------------------------------------------------

  release:
    name: Release
    needs: [build, build-android]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' crates/mumble-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Fancy Mumble ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.apk
